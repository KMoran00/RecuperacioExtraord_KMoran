<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/jquery-ui.css">
    <script src="./js/jquery-3.7.1.min.js"></script>
    <script src="./js/jquery-ui.js"></script>
    <script src="./js/index.js" type="application/javascript"></script>
</head>
<body>
    <!-- Responsive navbar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Catálogo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#!">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#!">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page header -->
    <header class="py-3 bg-light border-bottom mb-4">
        <div class="container">
            <div class="text-center my-2">
                <h1 class="fw-bolder">Catálogo de Productos</h1>
                <p class="lead mb-0">Gestión de inventario</p>
            </div>
            <div class="text-start">
                <p>Ordenar por:
                    <button class="btn btn-secondary mx-2" id="btnRelevancia">Relevancia</button>
                    <button class="btn btn-secondary mx-2" id="btnPrecioAlto">Precio ↓</button>
                    <button class="btn btn-secondary mx-2" id="btnPrecioBajo">Precio ↑</button>
                </p>
            </div>
        </div>
    </header>

    <!-- Page content-->
    <div class="container">
        <div class="row">
            <!-- Listado de productos -->
            <div class="col-lg-8">
                <table class="table table-bordered align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listado">
                        <!--
                        <tr>
                            <td><strong>1</strong></td>
                            <td>MacBook Pro 14</td>
                            <td><span class="badge bg-info">Portátiles</span></td>
                            <td><span class="badge bg-warning text-dark">2199.99€</span></td>
                            <td>12</td>
                            <td><span class="badge bg-success">Activo</span></td>
                            <td>
                                <button class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil-square"></i></button>
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                        -->
                    </tbody>
                </table>
            </div>

            <!-- Side widgets-->
            <div class="col-lg-4">
                <!-- Search widget-->
                <div class="card mb-4">
                    <div class="card-header">Buscar</div>
                    <div class="card-body">
                        <div class="input-group">
                            <input class="form-control" type="text" placeholder="Buscar por nombre..."
                                aria-label="Buscar por nombre..." id="buscador" />
                            <button id="btnBuscar" class="btn btn-primary" type="button">Buscar</button>
                        </div>
                    </div>
                </div>

                <!-- Filtros -->
                <div class="card mb-4">
                    <div class="card-header">Filtrar</div>
                    <div class="card-body">
                        <form id="form-filtro">
                            <div class="form-group">
                                <label for="filtroCat" class="form-label">Categoría</label>
                                <select id="filtroCat" class="form-control mb-3">
                                    <option value="">Todas las categorías</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="filtroStock" class="form-label">Stock</label>
                                <select id="filtroStock" class="form-control mb-3">
                                    <option value="">Todos</option>
                                    <option value="disponible">Con stock</option>
                                    <option value="agotado">Agotado</option>
                                </select>
                            </div>

                            <p class="text-danger" id="errorMensaje"></p>
                            <button type="reset" class="btn btn-secondary mx-2" id="btnLimpiar">Limpiar filtros</button>
                            <button type="submit" class="btn btn-primary mx-2" id="btnFiltrar">Aplicar</button>
                        </form>
                    </div>
                </div>

                <!-- Formulario agregar/editar -->
                <div class="card mb-4">
                    <div class="card-header bg-dark text-white" id="tituloFormulario">Agregar producto</div>
                    <div class="card-body">
                        <form id="formulario-producto">
                            <input type="hidden" id="productoId">

                            <div class="mb-2">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" id="nombre" name="nombre" class="form-control"
                                    required pattern="^[\w\s\-\.]{3,60}$" placeholder="Nombre del producto">
                            </div>

                            <div class="mb-2">
                                <label for="categoria" class="form-label">Categoría</label>
                                <input type="text" id="categoria" name="categoria" class="form-control"
                                    required pattern="^[\w\s]{2,40}$" placeholder="Categoría">
                            </div>

                            <div class="mb-2">
                                <label for="precio" class="form-label">Precio (€)</label>
                                <input type="text" id="precio" name="precio" class="form-control"
                                    required pattern="^\d+(\.\d{1,2})?$" placeholder="199.99">
                            </div>

                            <div class="mb-2">
                                <label for="stock" class="form-label">Stock</label>
                                <input type="text" id="stock" name="stock" class="form-control"
                                    required pattern="^\d+$" placeholder="0">
                            </div>

                            <div class="mb-2">
                                <label for="descripcion" class="form-label">Descripción</label>
                                <textarea id="descripcion" name="descripcion" class="form-control"
                                    maxlength="200" required placeholder="Descripción del producto"></textarea>
                            </div>

                            <div class="mb-2">
                                <label for="img" class="form-label">Imagen (.jpg/.png/.webp)</label>
                                <input type="text" id="img" name="img" class="form-control"
                                    required pattern="^.+\.(jpg|png|webp)$" placeholder="foto.jpg">
                            </div>

                            <p class="text-danger mt-2" id="errorMensaje"></p>

                            <button type="reset" class="btn btn-secondary mt-2" id="btnCancelar">Cancelar</button>
                            <button type="submit" class="btn btn-primary mt-2" id="btnEnviar">Agregar</button>
                        </form>
                    </div>
                </div>

                <!-- Info widget-->
                <div class="card mb-4">
                    <div class="card-header">Información</div>
                    <div class="card-body">
                        <p id="infoProductos">Total de productos: <strong id="totalProductos">0</strong></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
